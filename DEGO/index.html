<!doctype html>
<html lang="en">
  <head>
    <title>&lt;model-viewer&gt; template</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <!-- OPTIONAL: The :focus-visible polyfill removes the focus ring for some input types -->
    <script src="https://unpkg.com/focus-visible@5.0.2/dist/focus-visible.js" defer></script>
  </head>
  <body>
      
   
    
    <!-- <model-viewer> HTML element -->
    <model-viewer bounds="tight" enable-pan src="DEGO_Export_03.gltf" ar ar-modes="scene-viewer webxr quick-look" camera-controls environment-image="Rainbow_Clouds_-_HDR_(10567121366)3.jpg" poster="poster.webp" shadow-intensity="0" exposure="1.12" auto-rotate shadow-softness="0" autoplay skybox-image="Rainbow_Clouds_-_HDR_(10567121366)3.jpg">
       <br><header class="logotitle">DEGO</header>
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
      <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br> <br>
      <footer class="logofooter">SUCH WOW ... MANY 3D</footer>
    </model-viewer>  

    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </body>
</html>
