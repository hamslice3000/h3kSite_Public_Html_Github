<!doctype html>
<html lang="en">
  <head>
    <title>DOGEOLITH</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <!-- OPTIONAL: The :focus-visible polyfill removes the focus ring for some input types -->
	<style>
		audio {
		  display: block;
		  margin-left: auto;
		  margin-right: auto;
		}
	</style>
    <script src="https://unpkg.com/focus-visible@5.0.2/dist/focus-visible.js" defer></script>
  </head>
  <body id="dogeolith">
  	<audio controls autoplay loop>
	  <source src="strauss-remix-also-sprach-zarathustra-2001-song.mp3" type="audio/mpeg">
	</audio>
<!-- 	<button type="button" id="mobileBtn" onclick="mobileSize()">View on mobile</button>
	<button type="button" id="desktopBtn" onclick="desktopSize()">View on desktop</button> -->
    <!-- <model-viewer> HTML element -->
    <model-viewer bounds="tight" src="Dogelith.gltf" ar ar-modes="scene-viewer webxr quick-look" camera-controls environment-image="360-degree_Panorama_of_the_Southern_Sky.jpg" poster="poster.png" shadow-intensity="1" exposure="2" auto-rotate skybox-image="360-degree_Panorama_of_the_Southern_Sky.jpg" camera-target="0.002216m 0.6m -0.2053m" shadow-softness="1">
      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>
      <button slot="ar-button" id="ar-button">
          View in your space
      </button>
      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>
	<!-- <div id="music"><embed src="AlsoSprachZarathustraOp30Strauss.mp3" autostart=true loop=false></div>	 -->
    <script src="script.js"></script>
    <!-- Loads <model-viewer> for browsers: -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </body>
</html>
